<!DOCTYPE html>
<html>
<head>
    <title>TaskFlow</title>

    <!-- ✅ CSS LINK (IMPORTANT FIX) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📝 TaskFlow - To-Do List</h1>

        <a href="/add">➕ Add Task</a>

        {% for task in tasks %}
        <div class="task">
            <span class="{% if task[2]=='Completed' %}completed{% endif %}">
                {{ task[1] }}
            </span>

            <div class="actions">
                <a href="/complete/{{ task[0] }}" class="complete">✔</a>
                <a href="/delete/{{ task[0] }}" class="delete">✖</a>
            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
